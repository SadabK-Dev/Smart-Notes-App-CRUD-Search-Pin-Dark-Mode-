<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
  <link rel="stylesheet" href="app.css">
</head>

<body>
  <button class="themeToggle">Dark 🌙</button>
  <div class="container">
    <h1>
      Notes App
    </h1>
    <div class="searchBox">
      <input type="text" placeholder="Search notes..." class="inputs search">
      <span class="searchFound"></span>
    </div>
    <textarea placeholder="Write your note here..." class="inputs inputNote"></textarea>
    <button class="btn add">
      Add
    </button>

    <div class="showNotes"></div>
  </div>

  <!-- <script src="index.js"></script> -->
  <script src="index1.js"></script>
</body>

</html>
